<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 100%;
    height: 100%;
    background: transparent;
    overflow: hidden;
  }

  #btn {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 36px;
    height: 36px;
    border-radius: 10px;
    border: 1px solid rgba(255,255,255,0.12);
    background: rgba(255,255,255,0.06);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    color: rgba(255,255,255,0.65);
    font-size: 16px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s ease;
    user-select: none;
  }

  #btn:hover {
    background: rgba(255,255,255,0.12);
    border-color: rgba(255,255,255,0.2);
    color: rgba(255,255,255,0.9);
  }

  #btn.active {
    background: rgba(90, 200, 250, 0.15);
    border-color: rgba(90, 200, 250, 0.35);
    color: rgba(90, 200, 250, 0.95);
    box-shadow: 0 0 12px rgba(90, 200, 250, 0.15);
  }

  #btn svg {
    width: 16px;
    height: 16px;
    fill: currentColor;
  }

  #tooltip {
    position: absolute;
    bottom: calc(50% + 24px);
    left: 50%;
    transform: translateX(-50%);
    background: rgba(15, 20, 32, 0.85);
    backdrop-filter: blur(16px);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 6px;
    padding: 4px 8px;
    font-family: 'Inter', sans-serif;
    font-size: 11px;
    color: rgba(255,255,255,0.7);
    white-space: nowrap;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.15s ease;
  }

  #btn:hover + #tooltip { opacity: 1; }
</style>
</head>
<body>

<button id="btn" title="Tema glass">
  <!-- Icono luna/sol según estado -->
  <svg id="icon-on" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
    <path d="M12 3a9 9 0 1 0 9 9c0-.46-.04-.92-.1-1.36a5.389 5.389 0 0 1-4.4 2.26 5.403 5.403 0 0 1-3.14-9.8c-.44-.06-.9-.1-1.36-.1z"/>
  </svg>
  <svg id="icon-off" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" style="display:none">
    <path d="M12 7c-2.76 0-5 2.24-5 5s2.24 5 5 5 5-2.24 5-5-2.24-5-5-5zM2 13h2c.55 0 1-.45 1-1s-.45-1-1-1H2c-.55 0-1 .45-1 1s.45 1 1 1zm18 0h2c.55 0 1-.45 1-1s-.45-1-1-1h-2c-.55 0-1 .45-1 1s.45 1 1 1zM11 2v2c0 .55.45 1 1 1s1-.45 1-1V2c0-.55-.45-1-1-1s-1 .45-1 1zm0 18v2c0 .55.45 1 1 1s1-.45 1-1v-2c0-.55-.45-1-1-1s-1 .45-1 1zM5.99 4.58a.996.996 0 0 0-1.41 0 .996.996 0 0 0 0 1.41l1.06 1.06c.39.39 1.03.39 1.41 0s.39-1.03 0-1.41L5.99 4.58zm12.37 12.37a.996.996 0 0 0-1.41 0 .996.996 0 0 0 0 1.41l1.06 1.06c.39.39 1.03.39 1.41 0a.996.996 0 0 0 0-1.41l-1.06-1.06zm1.06-12.37l-1.06 1.06a.996.996 0 0 0 0 1.41c.39.39 1.03.39 1.41 0l1.06-1.06a.996.996 0 0 0 0-1.41.996.996 0 0 0-1.41 0zM7.05 18.36l-1.06 1.06a.996.996 0 0 0 0 1.41c.39.39 1.03.39 1.41 0l1.06-1.06a.996.996 0 0 0 0-1.41.996.996 0 0 0-1.41 0z"/>
  </svg>
</button>
<div id="tooltip">Tema glass</div>

<script>
  var STORAGE_KEY = "homarr-glass-theme";
  var themeOn = true;
  var btn = document.getElementById("btn");
  var iconOn = document.getElementById("icon-on");
  var iconOff = document.getElementById("icon-off");
  var tooltip = document.getElementById("tooltip");

  // Leer estado guardado
  try {
    var saved = localStorage.getItem(STORAGE_KEY);
    if (saved === "off") themeOn = false;
  } catch(e) {}

  function applyState() {
    var parent = window.parent.document;
    var body = parent.body;

    if (themeOn) {
      body.classList.remove("theme-off");
      btn.classList.add("active");
      iconOn.style.display = "block";
      iconOff.style.display = "none";
      tooltip.textContent = "Desactivar tema";
    } else {
      body.classList.add("theme-off");
      btn.classList.remove("active");
      iconOn.style.display = "none";
      iconOff.style.display = "block";
      tooltip.textContent = "Activar tema";
    }

    // Navbar transparente — se gestiona aquí también
    syncNavbar(parent);
  }

  function syncNavbar(doc) {
    var header = doc.querySelector("header") || doc.querySelector("nav");
    if (!header) return;

    // Escuchar scroll del contenedor principal
    var scrollEl = doc.querySelector("main") ||
                   doc.querySelector("#root > div") ||
                   doc.defaultView;

    var scrollKey = "_glass_scroll_bound";
    if (!scrollEl[scrollKey]) {
      scrollEl[scrollKey] = true;

      var onScroll = function() {
        var y = scrollEl.scrollTop !== undefined
          ? scrollEl.scrollTop
          : doc.defaultView.scrollY;

        if (y > 10) {
          doc.documentElement.classList.add("nav-scrolled");
        } else {
          doc.documentElement.classList.remove("nav-scrolled");
        }
      };

      scrollEl.addEventListener("scroll", onScroll, { passive: true });

      // También window por si acaso
      try {
        doc.defaultView.addEventListener("scroll", onScroll, { passive: true });
      } catch(e) {}
    }
  }

  btn.addEventListener("click", function() {
    themeOn = !themeOn;
    try { localStorage.setItem(STORAGE_KEY, themeOn ? "on" : "off"); } catch(e) {}
    applyState();
  });

  // Aplicar estado inicial cuando el padre esté listo
  function init() {
    try {
      applyState();
    } catch(e) {
      // Si el iframe aún no tiene acceso al padre, reintentar
      setTimeout(init, 200);
    }
  }

  if (document.readyState === "complete") {
    setTimeout(init, 300);
  } else {
    window.addEventListener("load", function() { setTimeout(init, 300); });
  }
</script>
</body>
</html>
